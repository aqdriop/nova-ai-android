name: Build NOVA AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Install buildozer and cython
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer
          pip install cython==0.29.36

      - name: Download Android SDK manually
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          mv cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools
          cp -r ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/* ~/.buildozer/android/platform/android-sdk/tools/
          echo "✅ SDK Command-line Tools instaladas"
          ls -la ~/.buildozer/android/platform/android-sdk/

      - name: Accept all Android SDK licenses
        run: |
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME > /dev/null 2>&1 || true
          yes | sdkmanager --sdk_root=$ANDROID_HOME \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-33" \
            "platforms;android-34" > /dev/null 2>&1 || true
          echo "✅ Licencias aceptadas y herramientas pre-instaladas"
          ls ~/.buildozer/android/platform/android-sdk/build-tools/ || echo "(no build-tools aún)"

      - name: Show buildozer.spec
        run: cat buildozer.spec | grep -E "^(requirements|package|version|android\.)" || true

      - name: Build APK
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          yes | buildozer -v android debug

      - name: Verify APK was created
        run: |
          if [ ! -d bin ] || [ -z "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "❌ No se generó ninguna APK"
            ls -lah bin/ 2>/dev/null || echo "(no existe bin/)"
            exit 1
          fi
          echo "✅ APK generada correctamente:"
          ls -lah bin/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NovaAI-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/android/platform/build-*/build.log
          retention-days: 7
          if-no-files-found: ignore
