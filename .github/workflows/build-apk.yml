name: Build NOVA AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache buildozer local
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}

      - name: Install buildozer and cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.36

      - name: Show buildozer.spec
        run: cat buildozer.spec | grep -E "^(requirements|package|version|android.api)" || true

      - name: Build APK
        run: |
          buildozer -v android debug
          echo "=== APK generated ==="
          ls -lah bin/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NovaAI-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/android/platform/build-*/build.log
            *.log
          retention-days: 7
          if-no-files-found: ignore
