name: Build NOVA AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-v2-${{ hashFiles('buildozer.spec') }}

      - name: Cache buildozer local
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-v2-${{ hashFiles('buildozer.spec') }}

      - name: Install buildozer and cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.36

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "504667f4c0de7af1a06de9f4b1727b84351f2910" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          echo "859f317696f67ef3d7f30a50a5560e7834b43903" > ~/.buildozer/android/platform/android-sdk/licenses/mips-android-sysimage-license
          echo "✅ Licencias pre-aceptadas"

      - name: Show buildozer.spec
        run: cat buildozer.spec | grep -E "^(requirements|package|version|android\.api)" || true

      - name: Build APK
        run: |
          yes | buildozer -v android debug
          echo "=== Contenido de bin/ ==="
          ls -lah bin/

      - name: Verify APK was created
        run: |
          if [ ! -d bin ] || [ -z "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "❌ No se generó ninguna APK"
            exit 1
          fi
          echo "✅ APK generada correctamente:"
          ls -lah bin/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NovaAI-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/android/platform/build-*/build.log
            *.log
          retention-days: 7
          if-no-files-found: ignore
