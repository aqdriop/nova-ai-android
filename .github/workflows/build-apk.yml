name: Build NOVA AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Install buildozer and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "buildozer==1.5.0"
          pip install "cython==0.29.36"

      - name: Show buildozer.spec
        run: |
          echo "=== buildozer.spec ==="
          cat buildozer.spec | grep -E "^(requirements|package|version|android\.|orientation|fullscreen)" || true

      - name: Build APK
        env:
          ANDROID_SDK_LICENSES_ACCEPT_ALL: "yes"
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Show last 100 lines of log
        if: always()
        run: |
          echo "=== Últimas 100 líneas del log ==="
          tail -n 100 build.log 2>/dev/null || echo "(sin log)"
          echo ""
          echo "=== Contenido de bin/ ==="
          ls -lah bin/ 2>/dev/null || echo "(no existe bin/)"

      - name: Verify APK was created
        run: |
          if [ ! -d bin ] || [ -z "$(ls -A bin/*.apk 2>/dev/null)" ]; then
            echo "❌ No se generó ninguna APK"
            exit 1
          fi
          echo "✅ APK generada correctamente:"
          ls -lah bin/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NovaAI-APK
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            .buildozer/android/platform/build-*/build.log
          retention-days: 7
          if-no-files-found: ignore
