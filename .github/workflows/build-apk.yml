name: Build NOVA AI APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-local-

      - name: Install buildozer and cython
        run: |
          python -m pip install --upgrade pip
          pip install --user buildozer
          pip install --user cython==0.29.36

      - name: Build APK with buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          yes | buildozer -v android debug 2>&1 | tee build.log
        continue-on-error: false

      - name: List output files
        if: always()
        run: |
          echo "=== Contenido de bin/ ==="
          ls -lah bin/ 2>/dev/null || echo "No existe bin/"
          echo "=== Últimas 50 líneas del log ==="
          tail -n 50 build.log 2>/dev/null || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NovaAI-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
